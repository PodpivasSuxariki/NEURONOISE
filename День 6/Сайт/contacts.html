<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Контакты — NEURONOISE</title>
  <meta name="description" content="Свяжитесь с нами, чтобы начать обучение нейросетям.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="site-shell contacts-shell">
    <header class="header cut-card" id="top">
      <a class="logo" href="index.html" aria-label="NEURONOISE, главная"><img src="assets/logo.svg" alt="NEURONOISE"></a>
      <button class="burger" type="button" aria-label="Открыть меню" aria-expanded="false"><span></span><span></span><span></span></button>
      <nav class="main-nav" aria-label="Главная навигация">
        <a href="index.html">Главная</a>
        <a href="index.html#courses">Курсы</a>
        <a href="lesson.html">Уроки</a>
        <a class="is-active" href="contacts.html">Контакты</a>
      </nav>
      <a class="btn btn-outline" href="contacts.html">Начать</a>
    </header>

    <main>
      <section class="contact-panel cut-card" aria-labelledby="contact-title">
        <div class="image-box contact-image" role="img" aria-label="Изображение на странице контактов"><span>Место для картинки</span></div>
        <div class="contact-form-wrap">
          <h1 id="contact-title">Свяжитесь с нами</h1>
          <form class="contact-form" action="#" method="post">
            <label><span class="icon">♙</span><input type="text" name="name" placeholder="Ваше имя" required></label>
            <label><span class="icon">✉</span><input type="email" name="email" placeholder="Email" required></label>
            <label><span class="icon">☏</span><input type="tel" name="phone" placeholder="Телефон"></label>
            <label><span class="icon">▱</span>
              <select name="course" required>
                <option value="">Выберите курс</option>
                <option>ChatGPT для жизни</option>
                <option>Генерация изображений</option>
                <option>Нейросети в работе</option>
              </select>
            </label>
            <label class="textarea"><span class="icon">▣</span><textarea name="message" rows="5" placeholder="Ваше сообщение"></textarea></label>
            <label class="checkbox"><input type="checkbox" required><span>Я согласен(а) на обработку персональных данных</span></label>
            <button class="btn btn-submit" type="submit">Отправить заявку</button>
          </form>
        </div>
      </section>

      <section class="contacts-block cut-card" aria-labelledby="contacts-title">
        <h2 id="contacts-title">Наши контакты</h2>
        <div class="contacts-grid">
          <article>
            <div class="contact-icon">☎</div>
            <h3>Телефон</h3>
            <a href="tel:+74951234567">+7 (495) 123-45-67</a>
          </article>
          <article>
            <div class="contact-icon">✉</div>
            <h3>Email</h3>
            <a href="mailto:info@neuronnoise.ru">info@neuronnoise.ru</a>
          </article>
          <article>
            <div class="contact-icon">⌖</div>
            <h3>Адрес</h3>
            <p>Москва, Россия</p>
          </article>
        </div>
        <div class="socials" aria-label="Социальные сети">
          <a href="#" aria-label="ВКонтакте">vk</a>
          <a href="#" aria-label="Telegram">tg</a>
          <a href="#" aria-label="YouTube">▶</a>
          <a href="#" aria-label="GitHub">gh</a>
          <a href="#" aria-label="Twitter">x</a>
        </div>
      </section>
    </main>

    <footer class="footer footer-compact cut-card">
      <a class="logo" href="index.html"><img src="assets/logo.svg" alt="NEURONOISE"></a>
      <nav class="footer-nav" aria-label="Навигация в подвале">
        <a href="index.html">Главная</a><a href="index.html#courses">Курсы</a><a href="lesson.html">Уроки</a><a href="contacts.html">Контакты</a>
      </nav>
      <a class="btn btn-outline" href="contacts.html">Начать</a>
      <p class="copyright">© 2025 NEURONOISE. Все права защищены.</p>
    </footer>
  </div>
  <script src="js/main.js"></script>
</body>
</html>
